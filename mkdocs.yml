site_name: Pythonlings
site_url: https://pythonlings.abhik.ai/
site_description: Python learnings, Rustlings-style, in a terminal TUI.
repo_url: https://github.com/abhiksark/pythonlings
repo_name: abhiksark/pythonlings
edit_uri: edit/main/docs-site/
docs_dir: docs-site

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Interface: interface.md
  - Curriculum: curriculum.md
  - Local Docs: local-docs.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abhiksark/pythonlings

extra_css:
  - stylesheets/extra.css
