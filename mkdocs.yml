site_name: Pythonlings
site_url: https://pythonlings.abhik.ai/
site_description: Python learnings, Rustlings-style, in a terminal TUI.
repo_url: https://github.com/abhiksark/pythonlings
repo_name: abhiksark/pythonlings
edit_uri: edit/main/docs-site/
docs_dir: docs-site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - search

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Interface: interface.md
  - Curriculum: curriculum.md
  - Local Docs: local-docs.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abhiksark/pythonlings
